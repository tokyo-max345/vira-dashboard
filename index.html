<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Viralana</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#f8fafc;color:#334155;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','Hiragino Sans',sans-serif;-webkit-font-smoothing:antialiased;}
    #gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;}
    #gate-box{text-align:center;}
    #gate-box h2{font-size:22px;font-weight:700;color:#1e293b;margin-bottom:6px;letter-spacing:-0.3px;}
    #gate-box p.sub{font-size:13px;color:#94a3b8;margin-bottom:28px;}
    #gate-box .input-row{display:flex;gap:8px;justify-content:center;}
    #gate-box input{background:#fff;border:1px solid #e2e8f0;color:#334155;padding:12px 16px;border-radius:12px;width:240px;font-size:14px;outline:none;transition:border-color 0.2s;}
    #gate-box input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
    #gate-box button{background:#1e293b;color:#fff;padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.2s;}
    #gate-box button:hover{background:#334155;}
    #err{color:#ef4444;font-size:12px;margin-top:14px;display:none;}
    #dash{display:none;min-height:100vh;padding:40px 24px;}
    #content{max-width:1080px;margin:0 auto;}
    @media(max-width:768px){
      #content div[style*="grid-template-columns:repeat(5"]{grid-template-columns:repeat(2,1fr) !important;}
      #content div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;}
      #dash{padding:24px 16px;}
    }
  </style>
</head>
<body>
  <div id="gate">
    <div id="gate-box">
      <h2>Viralana</h2>
      <p class="sub">パスワードを入力してください</p>
      <div class="input-row">
        <input type="password" id="pw" placeholder="パスワード" onkeydown="if(event.key==='Enter')unlock()">
        <button onclick="unlock()">開く</button>
      </div>
      <p id="err">パスワードが違います</p>
    </div>
  </div>
  <div id="dash">
    <div id="content"></div>
  </div>
