<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Viralana</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#f8fafc;color:#334155;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','Hiragino Sans',sans-serif;-webkit-font-smoothing:antialiased;}
    #gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;}
    #gate-box{text-align:center;}
    #gate-box h2{font-size:22px;font-weight:700;color:#1e293b;margin-bottom:6px;letter-spacing:-0.3px;}
    #gate-box p.sub{font-size:13px;color:#94a3b8;margin-bottom:28px;}
    #gate-box .input-row{display:flex;gap:8px;justify-content:center;}
    #gate-box input{background:#fff;border:1px solid #e2e8f0;color:#334155;padding:12px 16px;border-radius:12px;width:240px;font-size:14px;outline:none;transition:border-color 0.2s;}
    #gate-box input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
    #gate-box button{background:#1e293b;color:#fff;padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.2s;}
    #gate-box button:hover{background:#334155;}
    #err{color:#ef4444;font-size:12px;margin-top:14px;display:none;}
    #dash{display:none;min-height:100vh;padding:40px 24px;}
    #content{max-width:1080px;margin:0 auto;}
    @media(max-width:768px){
      #content div[style*="grid-template-columns:repeat(5"]{grid-template-columns:repeat(2,1fr) !important;}
      #content div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;}
      #dash{padding:24px 16px;}
    }
  </style>
</head>
<body>
  <div id="gate">
    <div id="gate-box">
      <h2>Viralana</h2>
      <p class="sub">パスワードを入力してください</p>
      <div class="input-row">
        <input type="password" id="pw" placeholder="パスワード" onkeydown="if(event.key==='Enter')unlock()">
        <button onclick="unlock()">開く</button>
      </div>
      <p id="err">パスワードが違います</p>
    </div>
  </div>
  <div id="dash">
    <div id="content"></div>
  </div>

      var qd=q.dist,maxQ=Math.max.apply(null,Object.values(qd).concat([1]));
      Object.keys(qd).forEach(function(r){var cnt=qd[r],pct=maxQ>0?(cnt/maxQ)*100:0,good=r==='6-8'||r==='8-10';h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;"><span style="font-size:11px;color:#64748b;font-weight:500;">'+cnt+'</span><div style="width:100%;background:'+(good?'#10b981':'#e2e8f0')+';border-radius:8px 8px 0 0;height:'+Math.max(pct,6)+'%;min-height:4px;"></div><span style="font-size:10px;color:#94a3b8;">'+r+'</span></div>';});

      h+='</div></div>';
      // 週次

      wr.forEach(function(r){var fc=r.follower_change!=null?(r.follower_change>=0?'+':'')+r.follower_change:'-';var cc=r.cost_usd!=null?'$'+Number(r.cost_usd).toFixed(2)+' (≈'+Math.round(Number(r.cost_usd)*150).toLocaleString()+'円)':'-';h+='<div style="background:#f8fafc;border-radius:14px;padding:22px;text-align:center;"><div style="font-size:12px;color:#94a3b8;margin-bottom:14px;">'+esc(r.week_start||'-')+'</div><div style="font-size:26px;font-weight:700;color:#1e293b;letter-spacing:-0.5px;">'+(r.total_posts!=null?r.total_posts:'-')+'</div><div style="font-size:11px;color:#94a3b8;margin-top:2px;">投稿</div><div style="margin-top:14px;display:flex;justify-content:center;gap:20px;"><div><div style="font-size:14px;font-weight:600;color:#ec4899;">'+fc+'</div><div style="font-size:10px;color:#94a3b8;">フォロワー</div></div><div><div style="font-size:14px;font-weight:600;color:#f59e0b;">'+cc+'</div><div style="font-size:10px;color:#94a3b8;">コスト</div></div></div></div>';});

    async function refreshDashboard(){
      var btn=document.getElementById('refresh-btn');
      if(!btn)return;
      btn.textContent='更新中...';btn.disabled=true;btn.style.opacity='0.6';
      try{
        var r=await fetch('https://vira-dashboard.vercel.app/api?pw='+encodeURIComponent(P)+'&format=json');
        if(!r.ok)throw new Error(r.status);
        var data=await r.json();
        document.getElementById('content').innerHTML=renderFromJson(data);
      }catch(e){
        var b=document.getElementById('refresh-btn');
        if(b){b.textContent='更新失敗';b.style.background='#ef4444';
        setTimeout(function(){b.textContent='更新';b.disabled=false;b.style.opacity='1';b.style.background='#1e293b';},2000);}
      }
    }
