<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Viralana Dashboard</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;}
    #gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f172a;}
    #gate-box{text-align:center;}
    #gate-box h2{font-size:20px;font-weight:600;color:#f1f5f9;margin-bottom:8px;letter-spacing:-0.3px;}
    #gate-box p.sub{font-size:13px;color:#475569;margin-bottom:24px;}
    #gate-box .input-row{display:flex;gap:8px;}
    #gate-box input{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:12px 16px;border-radius:12px;width:240px;font-size:14px;outline:none;transition:border-color 0.2s;}
    #gate-box input:focus{border-color:#3b82f6;}
    #gate-box button{background:#3b82f6;color:#fff;padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.2s;}
    #gate-box button:hover{background:#2563eb;}
    #err{color:#f87171;font-size:12px;margin-top:12px;display:none;}
    #dash{display:none;min-height:100vh;padding:32px 24px;}
    #content{max-width:1080px;margin:0 auto;}
    @media(max-width:768px){
      #content div[style*="grid-template-columns:repeat(5"]{grid-template-columns:repeat(2,1fr) !important;}
      #content div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;}
    }
  </style>
</head>
<body>
  <div id="gate">
    <div id="gate-box">
      <h2>Viralana</h2>
      <p class="sub">Enter password to view dashboard</p>
      <div class="input-row">
        <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()">
        <button onclick="unlock()">Open</button>
      </div>
      <p id="err">Incorrect password</p>
    </div>
  </div>
  <div id="dash">
    <div id="content"></div>
  </div>
