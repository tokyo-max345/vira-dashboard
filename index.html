    async function unlock(){
      var p=document.getElementById('pw').value;
      var buf=new TextEncoder().encode(p);
      var hash=await crypto.subtle.digest('SHA-256',buf);
      var hex=Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
      if(hex===H){
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('dash').classList.remove('hidden');
        document.getElementById('content').innerHTML=atob(D);
        sessionStorage.setItem('vd','1');
      }else{
        document.getElementById('err').classList.remove('hidden');
      }
    }
    if(sessionStorage.getItem('vd')==='1'){
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('dash').classList.remove('hidden');
      document.getElementById('content').innerHTML=atob(D);
    }
