<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Viralana</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#f8fafc;color:#334155;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','Hiragino Sans',sans-serif;-webkit-font-smoothing:antialiased;}
    #gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;}
    #gate-box{text-align:center;}
    #gate-box h2{font-size:22px;font-weight:700;color:#1e293b;margin-bottom:6px;letter-spacing:-0.3px;}
    #gate-box p.sub{font-size:13px;color:#94a3b8;margin-bottom:28px;}
    #gate-box .input-row{display:flex;gap:8px;justify-content:center;}
    #gate-box input{background:#fff;border:1px solid #e2e8f0;color:#334155;padding:12px 16px;border-radius:12px;width:240px;font-size:14px;outline:none;transition:border-color 0.2s;}
    #gate-box input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
    #gate-box button{background:#1e293b;color:#fff;padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.2s;}
    #gate-box button:hover{background:#334155;}
    #err{color:#ef4444;font-size:12px;margin-top:14px;display:none;}
    #dash{display:none;min-height:100vh;padding:40px 24px;}
    #content{max-width:1080px;margin:0 auto;}
    @media(max-width:768px){
      #content div[style*="grid-template-columns:repeat(5"]{grid-template-columns:repeat(2,1fr) !important;}
      #content div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;}
      #dash{padding:24px 16px;}
    }
  </style>
</head>
<body>
  <div id="gate">
    <div id="gate-box">
      <h2>Viralana</h2>
      <p class="sub">パスワードを入力してください</p>
      <div class="input-row">
        <input type="password" id="pw" placeholder="パスワード" onkeydown="if(event.key==='Enter')unlock()">
        <button onclick="unlock()">開く</button>
      </div>
      <p id="err">パスワードが違います</p>
    </div>
  </div>
  <div id="dash">
    <div id="content"></div>
  </div>

      h+='</div></div>';

      tp.forEach(function(p,i){var col=PF_COLORS[p.platform]||'#94a3b8';h+='<div style="display:flex;align-items:center;gap:14px;padding:14px 8px;'+(i<tp.length-1?'border-bottom:1px solid #f8fafc;':'')+'"><span style="font-size:14px;font-weight:700;color:#cbd5e1;width:22px;text-align:right;">'+(i+1)+'</span><div style="width:30px;height:30px;border-radius:'+Math.round(30*0.22)+'px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">'+pfSvg(p.platform,30)+'</div><div style="flex:1;min-width:0;"><div style="font-size:13px;color:#334155;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;">'+esc(p.content)+'</div><div style="font-size:11px;color:#94a3b8;margin-top:2px;">'+p.date+'</div></div><div style="flex-shrink:0;text-align:right;"><span style="font-size:15px;font-weight:700;color:#ec4899;">'+p.likes+'</span><span style="font-size:11px;color:#cbd5e1;margin-left:2px;">いいね</span></div></div>';});

      fks.forEach(function(fp){var fi=fs[fp],col=PF_COLORS[fp]||'#94a3b8',cc=fi.change>=0?'#10b981':'#ef4444',cs=fi.change>=0?'+':'';h+='<div style="background:#f8fafc;border-radius:14px;padding:22px;text-align:center;position:relative;overflow:hidden;"><div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+col+';"></div><div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;"><div style="width:30px;height:30px;border-radius:'+Math.round(30*0.22)+'px;display:flex;align-items:center;justify-content:center;overflow:hidden;">'+pfSvg(fp,30)+'</div><span style="font-size:12px;color:#94a3b8;">@'+esc(fi.username)+'</span></div><div style="font-size:30px;font-weight:700;color:#1e293b;letter-spacing:-1px;">'+fN(fi.current)+'</div><div style="font-size:11px;color:#94a3b8;margin-top:2px;">フォロワー</div><div style="margin-top:10px;font-size:14px;font-weight:600;color:'+cc+';">'+cs+fi.change+' ('+cs+fi.changePercent+'%)</div><div style="font-size:10px;color:#94a3b8;margin-top:2px;">30日間の変化</div><div style="margin-top:10px;font-size:11px;color:#94a3b8;">フォロー中: '+fN(fi.following)+'</div></div>';});

    async function refreshDashboard(){
      var btn=document.getElementById('refresh-btn');
      if(!btn)return;
      btn.textContent='更新中...';btn.disabled=true;btn.style.opacity='0.6';
      try{
        var r=await fetch('https://vira-dashboard.vercel.app/api?pw='+encodeURIComponent(P)+'&format=json');
        if(!r.ok)throw new Error(r.status);
        var data=await r.json();
        var html=renderFromJson(data);
        // _allパネルがあればそこだけ更新（タブ構造を壊さない）
        var allPanel=document.querySelector('[data-panel="_all"]');
        if(allPanel){
          allPanel.innerHTML=html;
          // _allタブに切り替え
          switchTab('_all');
        }else{
          document.getElementById('content').innerHTML=html;
        }
        // 最終更新時刻をヘッダーにも反映
        var tsEl=document.querySelector('[data-generated-at]');
        if(tsEl)tsEl.textContent='最終更新: '+esc(data.generatedAt);
        btn.textContent='更新';btn.disabled=false;btn.style.opacity='1';
        try{localStorage.setItem('vd_html',document.getElementById('content').innerHTML);}catch(e){}
      }catch(e){
        var b=document.getElementById('refresh-btn');
        if(b){b.textContent='更新失敗';b.style.background='#ef4444';
        setTimeout(function(){b.textContent='更新';b.disabled=false;b.style.opacity='1';b.style.background='#1e293b';},2000);}
      }
    }
